# ------------------------------------------------------------
# Support Upgrade header (SSE/WebSocket). This file is included inside http{}.
# ------------------------------------------------------------
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# ------------------------------------------------------------
# Default SSL catch-all: prevents accidental SNI misrouting
# ------------------------------------------------------------
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate           /etc/pki/tls/certs/fullchain.pem;
    ssl_certificate_key       /etc/pki/tls/certs/privkey_nopass.pem;
    ssl_trusted_certificate   /etc/pki/tls/certs/chain.pem;

    return 421;  # Misdirected Request
}

# ------------------------------------------------------------
# HTTP (Port 80): serve content for both hostnames (no redirect yet)
# ------------------------------------------------------------
server {
    listen 80;
    server_name svgc32zevi.dot.ca.gov svgc32zevi;

    client_max_body_size 100M;
    
    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;

    # React SPA
    root /var/www/evinfra;
    index index.html;

    # ----- Authelia helpers (MUST be inside server) -----
    # Internal endpoint to validate requests with Authelia.
    location = /authelia-verify {
        internal;
        proxy_pass http://127.0.0.1:9091/api/verify;
        proxy_set_header X-Original-URL    $scheme://$http_host$request_uri;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
    }

    # Handle 401 from auth_request by redirecting to Authelia’s portal with rd=<target>
    location = /authelia-redirect {
        internal;
        set $target $scheme://$http_host$request_uri;
        return 302 /authelia/?rd=$target;
    }
    # ----------------------------------------------------

    # Authelia portal on the same host (do NOT protect to avoid loops)
    location /authelia/ {
        proxy_pass http://127.0.0.1:9091/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # React SPA – auth is handled client-side via OIDC
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API – JWT validation handled by Flask
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}

# ------------------------------------------------------------
# HTTPS (Port 443): primary vhost for both hostnames
# ------------------------------------------------------------
server {
    listen 443 ssl;
    server_name svgc32zevi.dot.ca.gov svgc32zevi;

    # --- TLS (use the unencrypted, matching key) ---
    ssl_certificate           /etc/pki/tls/certs/fullchain.pem;
    ssl_certificate_key       /etc/pki/tls/certs/privkey_nopass.pem;
    ssl_trusted_certificate   /etc/pki/tls/certs/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # OCSP stapling (recommended)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    client_max_body_size 100M;

    # React SPA
    root /var/www/evinfra;
    index index.html;



    # Authelia portal over HTTPS
    location /authelia/ {
        proxy_pass http://127.0.0.1:9091/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # React SPA – auth is handled client-side via OIDC
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API – JWT validation handled by Flask
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # MinIO reverse proxy under HTTPS (preserve presigned signature) — unchanged
    location /minio/ {
        proxy_pass http://10.112.93.139:9000/;
        proxy_http_version 1.1;

        # IMPORTANT: Match presign Host header (include port)
        proxy_set_header Host              10.112.93.139:9000;

        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_redirect off;
        proxy_buffering on;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Security headers (enable once HTTPS trust is confirmed everywhere)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header X-Frame-Options "SAMEORIGIN" always;
}