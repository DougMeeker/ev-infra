server {
    listen 80;
    server_name svgc32zevi.dot.ca.gov;

    # Frontend: serve React build directly from nginx
    root /opt/evinfra/frontend/build;
    index index.html;

    # Cache static assets aggressively (optional)
    location /static/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public";
    }

    # SPA routing: fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API: proxy to gunicorn on localhost:5000
    # Use proxy_pass without a path to preserve incoming URI
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
